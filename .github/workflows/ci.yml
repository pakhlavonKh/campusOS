name: CampusOS CI — Lint, Typecheck, Unit Tests & Build Guard

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 2

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install pnpm
      uses: pnpm/action-setup@v3
      with:
        version: 9
        run_install: false

    - name: Get pnpm store directory
      shell: bash
      run: |
        echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

    - name: Setup pnpm cache
      uses: actions/cache@v4
      with:
        path: ${{ env.STORE_PATH }}
        key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-store-

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Lint
      run: pnpm run lint

    - name: Type Check
      run: pnpm run type-check

    - name: GAP-SEC-02 — Platform Build Guard
      run: |
        echo "Checking customer apps (web, mobile) for platform super admin API surface leakage..."
        # Flags actual API-namespace or JWT-role-claim leakage, not route-path strings or comments.
        # /platform/v1/ — the cross-tenant API namespace that must never appear in customer apps.
        # platform_super_admin (as a role claim string in JS/TS, not in a comment) — would indicate
        # the customer app is reading or asserting this role to unlock functionality at runtime.
        if grep -rEn "(\/platform\/v1\/|['\"]platform_super_admin['\"])" \
            apps/web/src apps/mobile/src 2>/dev/null | grep -v "//.*platform_super_admin"; then
          echo "❌ CRITICAL: Platform super-admin API surface found in customer-facing app!"
          exit 1
        else
          echo "✅ Build guard passed: No super admin API surface in customer apps."
        fi

    - name: Test (Unit & Integration)
      run: pnpm run test

    - name: Build
      run: pnpm run build
