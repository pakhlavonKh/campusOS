name: CampusOS CI — Lint, Typecheck, Unit Tests & Build Guard

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 2

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install pnpm
      uses: pnpm/action-setup@v3
      with:
        version: 9
        run_install: false

    - name: Get pnpm store directory
      shell: bash
      run: |
        echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

    - name: Setup pnpm cache
      uses: actions/cache@v4
      with:
        path: ${{ env.STORE_PATH }}
        key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-store-

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Lint
      run: pnpm run lint

    - name: Type Check
      run: pnpm run type-check

    - name: GAP-SEC-02 — Platform Build Guard
      run: |
        echo "Checking customer apps (web, mobile, desktop) for platform super admin leakage..."
        if grep -rE "(/admin|/platform/v1|platform_super_admin)" apps/web/src apps/mobile/src 2>/dev/null; then
          echo "❌ CRITICAL ERROR: Super Admin code/route found inside customer application!"
          exit 1
        else
          echo "✅ Build guard passed: No super admin surface found in customer apps."
        fi

    - name: Test (Unit & Integration)
      run: pnpm run test

    - name: Build
      run: pnpm run build
