name: Integration Tests & Tenant Isolation Verification

on:
  push:
    branches: [ main ]

jobs:
  integration-tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: campusos
          POSTGRES_USER: campusos
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Database Migrations
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: campusos
          DB_PASS: password
          DB_NAME: campusos
        run: pnpm --filter @campusos/backend migration:run

      - name: Run Database Seeders
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: campusos
          DB_PASS: password
          DB_NAME: campusos
        run: pnpm --filter @campusos/backend seed

      - name: Execute Tenant Isolation & Auth Integration Tests
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: campusos
          DB_PASS: password
          DB_NAME: campusos
          REDIS_HOST: localhost
          REDIS_PORT: 6379
        run: pnpm --filter @campusos/backend test:integration
