version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: campusos-postgres
    environment:
      POSTGRES_USER: campusos
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: campusos
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U campusos"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: campusos-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: campusos-backend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USERNAME=campusos
      - DB_PASSWORD=password123
      - DB_DATABASE=campusos
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=super_secret_jwt_key_change_me_in_prod
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: campusos-web
    ports:
      - "5173:80" # Mapping to Nginx default port
    depends_on:
      - backend

volumes:
  pgdata:
  redisdata:
