# CampusOS — Local Development Infrastructure
# Based on SDD §1.5 Deployment Strategy

version: '3.9'

services:
  # ─── PostgreSQL 16+ ───
  postgres:
    image: postgres:16-alpine
    container_name: campusos-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: campusos
      POSTGRES_USER: campusos
      POSTGRES_PASSWORD: campusos_dev_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U campusos']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis 7+ ───
  redis:
    image: redis:7-alpine
    container_name: campusos-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── MinIO (S3-compatible storage) ───
  minio:
    image: minio/minio:latest
    container_name: campusos-minio
    restart: unless-stopped
    ports:
      - '9000:9000'   # API
      - '9001:9001'   # Console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── OpenSearch 2.x (Full-text search) ───
  opensearch:
    image: opensearchproject/opensearch:2.15.0
    container_name: campusos-opensearch
    restart: unless-stopped
    ports:
      - '9200:9200'
    environment:
      - discovery.type=single-node
      - plugins.security.disabled=true
      - 'OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m'
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:9200/_cluster/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 5

  # ─── MailHog (Email testing) ───
  mailhog:
    image: mailhog/mailhog:latest
    container_name: campusos-mailhog
    restart: unless-stopped
    ports:
      - '1025:1025'   # SMTP
      - '8025:8025'   # Web UI

volumes:
  postgres_data:
  redis_data:
  minio_data:
  opensearch_data:
